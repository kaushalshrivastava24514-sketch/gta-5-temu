<!DOCTYPE html>
<html>
<head>
    <title>Kaushal Theft Auto</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #111, #1a1a1a);
            color: white;
            text-align: center;
        }

        header {
            padding: 40px;
            font-size: 40px;
            font-weight: bold;
            background: black;
            letter-spacing: 2px;
        }

        .section {
            padding: 60px 20px;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            background: crimson;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
        }

        button:hover {
            background: red;
            transform: scale(1.05);
        }

        footer {
            padding: 20px;
            background: black;
            font-size: 14px;
        }
    </style>
</head>

<body>

<header>
    KAUSHAL THEFT AUTO
</header>

<div class="section">
    <h2>Open World. Total Freedom.</h2>
    <p>Drive. Explore. Build your empire.</p>
    <button onclick="launchGame()">Play Now</button>
</div>

<div class="section">
    <h2>Features</h2>
    <p>✔ Open World City</p>
    <p>✔ Cars & Exploration</p>
    <p>✔ Missions Coming Soon</p>
</div>

<footer>
    Built by Kaushal Shrivastava © 2026
</footer>

<script>
function launchGame() {
    alert("Game launching soon! This is Version 0.1 🚀");
}
</script>

</body>
</html>
