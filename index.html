<!DOCTYPE html>
<html>
<head>
<title>Kaushal Crime City</title>
<style>
body {
    margin: 0;
    background: linear-gradient(135deg,#111,#1e1e1e);
    font-family: Arial;
    color: white;
    overflow: hidden;
}

#menu {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

button {
    padding: 15px 30px;
    font-size: 18px;
    background: crimson;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 6px;
}

button:hover {
    background: red;
}

canvas {
    display: none;
    background: #2b2b2b;
}
</style>
</head>
<body>

<div id="menu">
    <h1>KAUSHAL CRIME CITY</h1>
    <p>Move: Arrow Keys | Shoot: Space</p>
    <button onclick="startGame()">Start Game</button>
</div>

<canvas id="gameCanvas" width="900" height="500"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let player = {x: 100, y: 250, size: 30, speed: 4};
let bullets = [];
let police = [];
let keys = {};
let gameRunning = false;

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

function startGame() {
    document.getElementById("menu").style.display = "none";
    canvas.style.display = "block";
    gameRunning = true;
    spawnPolice();
    gameLoop();
}

function spawnPolice() {
    setInterval(() => {
        police.push({
            x: 800,
            y: Math.random() * 450,
            size: 30,
            speed: 2
        });
    }, 2000);
}

function update() {
    if (keys["ArrowUp"]) player.y -= player.speed;
    if (keys["ArrowDown"]) player.y += player.speed;
    if (keys["ArrowLeft"]) player.x -= player.speed;
    if (keys["ArrowRight"]) player.x += player.speed;

    if (keys[" "]){
        bullets.push({x: player.x + player.size, y: player.y + 10});
        keys[" "] = false;
    }

    bullets.forEach(b => b.x += 6);

    police.forEach(p => {
        if (p.x > player.x) p.x -= p.speed;
        if (p.y < player.y) p.y += p.speed;
        if (p.y > player.y) p.y -= p.speed;
    });

    police = police.filter(p => {
        for (let b of bullets) {
            if (b.x < p.x + p.size &&
                b.x + 5 > p.x &&
                b.y < p.y + p.size &&
                b.y + 5 > p.y) {
                return false;
            }
        }
        return true;
    });
}

function drawCity() {
    ctx.fillStyle = "#444";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Buildings
    ctx.fillStyle = "#555";
    for (let i = 0; i < canvas.width; i += 120) {
        ctx.fillRect(i, 0, 80, 150);
    }

    // Road
    ctx.fillStyle = "#222";
    ctx.fillRect(0, 200, canvas.width, 100);

    ctx.fillStyle = "white";
    for (let i = 0; i < canvas.width; i += 60) {
        ctx.fillRect(i, 245, 30, 10);
    }
}

function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawCity();

    // Player
    ctx.fillStyle = "red";
    ctx.fillRect(player.x, player.y, player.size, player.size);

    // Bullets
    ctx.fillStyle = "yellow";
    bullets.forEach(b => ctx.fillRect(b.x, b.y, 5, 5));

    // Police
    ctx.fillStyle = "blue";
    police.forEach(p => ctx.fillRect(p.x, p.y, p.size, p.size));
}

function gameLoop() {
    if (!gameRunning) return;
    update();
    draw();
    requestAnimationFrame(gameLoop);
}
</script>

</body>
</html>
